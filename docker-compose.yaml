services:
  reverse_proxy:
    image: quay.io/sashwatk/nginx:latest
    container_name: hpcr-reverse-proxy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${REVERSE_PROXY_PORT:-8080}:80"
    volumes:
      - ${NGINX_CONF_PATH:-./config/nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=1777
      - /var/run:uid=101,gid=101,mode=1777
      - /tmp:uid=101,gid=101,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net
    restart: unless-stopped

  postgres:
    image: quay.io/sashwatk/postgres:latest
    container_name: hpcr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hpcr_builder}
      POSTGRES_USER: ${POSTGRES_USER:-hpcr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hpcr} -d ${POSTGRES_DB:-hpcr_builder}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    networks:
      - db_net

  pgadmin:
    image: quay.io/sashwatk/pgadmin4:latest
    container_name: hpcr-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@hpcr-builder.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me-pgadmin-password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - db_net

  vault:
    image: quay.io/sashwatk/vault:latest
    container_name: hpcr-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - app_net
    restart: unless-stopped

  vault-init:
    image: quay.io/sashwatk/vault:latest
    container_name: hpcr-vault-init
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        export VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
        export VAULT_TOKEN=${VAULT_TOKEN:-dev-root-token}
        if vault secrets list | grep -q "^${VAULT_TRANSIT_MOUNT:-transit}/"; then
          echo "Transit mount '${VAULT_TRANSIT_MOUNT:-transit}' already enabled"
        else
          vault secrets enable -path=${VAULT_TRANSIT_MOUNT:-transit} transit
        fi
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - app_net

  vault-ui:
    image: quay.io/sashwatk/vault-ui:latest
    container_name: hpcr-vault-ui
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_URL_DEFAULT: ${VAULT_ADDR:-http://vault:8200}
      VAULT_AUTH_DEFAULT: TOKEN
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    ports:
      - "${VAULT_UI_PORT:-8000}:8000"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hpcr-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY:-24h}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      MAX_PAYLOAD_SIZE: ${MAX_PAYLOAD_SIZE:-52428800}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30s}
      ADMIN_NAME: ${ADMIN_NAME:?ADMIN_NAME must be set}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      KEY_PROVIDER: vault
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-token}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      VAULT_TRANSIT_MOUNT: ${VAULT_TRANSIT_MOUNT:-transit}
      VAULT_REQUEST_TIMEOUT: ${VAULT_REQUEST_TIMEOUT:-10s}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_net
      - db_net
    restart: unless-stopped

  migrate:
    image: quay.io/sashwatk/migrate:latest
    container_name: hpcr-migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command:
      [
        "-path=/migrations",
        "-database=${MIGRATE_DATABASE_URL:?MIGRATE_DATABASE_URL must be set}",
        "up"
      ]
    volumes:
      - ./backend/migrations:/migrations:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - db_net

networks:
  app_net:
  db_net:
    internal: true

volumes:
  pgadmin_data:
