services:
  reverse_proxy:
    image: nginx:1.27-alpine
    container_name: hpcr-reverse-proxy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${REVERSE_PROXY_PORT:-8080}:80"
    volumes:
      - ${NGINX_CONF_PATH:-./config/nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hpcr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hpcr_builder}
      POSTGRES_USER: ${POSTGRES_USER:-hpcr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hpcr} -d ${POSTGRES_DB:-hpcr_builder}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    networks:
      - db_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hpcr-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY:-24h}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      MAX_PAYLOAD_SIZE: ${MAX_PAYLOAD_SIZE:-52428800}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30s}
      ADMIN_NAME: ${ADMIN_NAME:?ADMIN_NAME must be set}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpus: 1.0
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app_net
      - db_net
    restart: unless-stopped

  migrate:
    image: migrate/migrate:4
    container_name: hpcr-migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command:
      [
        "-path=/migrations",
        "-database=${MIGRATE_DATABASE_URL:?MIGRATE_DATABASE_URL must be set}",
        "up"
      ]
    volumes:
      - ./backend/migrations:/migrations:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - db_net

networks:
  app_net:
  db_net:
    internal: true
