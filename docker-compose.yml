services:

  postgres:
    image: postgres:16-alpine
    container_name: hpcr-postgres
    environment:
      POSTGRES_DB: hpcr_builder
      POSTGRES_USER: hpcr
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpcr -d hpcr_builder"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hpcr-backend
    environment:
      DATABASE_URL: postgres://hpcr:devpass@postgres:5432/hpcr_builder?sslmode=disable
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      TOKEN_EXPIRY: 24h
      BCRYPT_COST: "12"
      LOG_LEVEL: info
      LOG_FORMAT: json
      MAX_PAYLOAD_SIZE: "52428800"
      ADMIN_NAME: "System Admin"
      ADMIN_EMAIL: "hpvs@ibm.com"
      ADMIN_PASSWORD: "admin123"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

  migrate:
    image: migrate/migrate:4
    container_name: hpcr-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-path=/migrations",
        "-database=postgres://hpcr:devpass@postgres:5432/hpcr_builder?sslmode=disable",
        "up"
      ]
    volumes:
      - ./backend/migrations:/migrations:ro

volumes:
  postgres_data:
