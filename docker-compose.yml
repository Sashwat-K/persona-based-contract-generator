services:
  reverse_proxy:
    image: nginx:1.27-alpine
    container_name: hpcr-reverse-proxy
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${REVERSE_PROXY_PORT:-8080}:80"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hpcr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hpcr_builder}
      POSTGRES_USER: ${POSTGRES_USER:-hpcr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hpcr} -d ${POSTGRES_DB:-hpcr_builder}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hpcr-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hpcr:devpass@postgres:5432/hpcr_builder?sslmode=disable}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8080}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY:-24h}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      MAX_PAYLOAD_SIZE: ${MAX_PAYLOAD_SIZE:-52428800}
      ADMIN_NAME: ${ADMIN_NAME:-System Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@hpcr-builder.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8080"
    networks:
      - app_net
      - db_net
    restart: unless-stopped

  migrate:
    image: migrate/migrate:4
    container_name: hpcr-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-path=/migrations",
        "-database=${MIGRATE_DATABASE_URL:-postgres://hpcr:devpass@postgres:5432/hpcr_builder?sslmode=disable}",
        "up"
      ]
    volumes:
      - ./backend/migrations:/migrations:ro
    networks:
      - db_net

networks:
  app_net:
    internal: true
  db_net:
    internal: true
